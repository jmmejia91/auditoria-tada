<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditoría TaDa - Valledupar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; margin-bottom: 5px; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background-color: #d32f2f; color: white; border: none; font-weight: bold; cursor: pointer; }
        .secondary-btn { background-color: #555; margin-top: 5px; }
        .gallery-btn { background-color: #2e7d32; }
        #video, #preview { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; }
        #status { display: none; color: #d32f2f; font-weight: bold; margin-top: 10px; }
        .hidden { display: none !important; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Auditoría TaDa</h2>
    
    <select id="operador">
        <option value="">Seleccione Operador...</option>
        <option value="Alberto Carcamo">Alberto Carcamo</option>
        <option value="Daniela Figueroa">Daniela Figueroa</option>
        <option value="Lisseth Rojas">Lisseth Rojas</option>
        <option value="Luis Quintero">Luis Quintero</option>
        <option value="Pearly Khan">Pearly Khan</option>
    </select>

    <video id="video" autoplay playsinline></video>
    <img id="preview" class="hidden">
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="status">Procesando... <span id="progress"></span></div>

    <div id="groupCamara">
        <button id="btnCapturar">TOMAR FOTO</button>
        <button id="btnGaleria" class="gallery-btn">SUBIR DE GALERÍA (VARIAS)</button>
        <input type="file" id="fileInput" accept="image/*" multiple>
    </div>

    <div id="groupConfirmar" class="hidden">
        <button id="btnEnviar">SÍ, ENVIAR ✅</button>
        <button id="btnReintentar" class="secondary-btn">CANCELAR / REPETIR ❌</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const btnCapturar = document.getElementById('btnCapturar');
    const btnGaleria = document.getElementById('btnGaleria');
    const fileInput = document.getElementById('fileInput');
    const btnEnviar = document.getElementById('btnEnviar');
    const btnReintentar = document.getElementById('btnReintentar');
    const groupConfirmar = document.getElementById('groupConfirmar');
    const groupCamara = document.getElementById('groupCamara');
    const status = document.getElementById('status');
    const progressText = document.getElementById('progress');
    const selectorOp = document.getElementById('operador');
    
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyH5WtN9TNodRvzdvDtgh0SV2ip9lVDPysZyd59TB40G-SbDE4WM8QbchkqUWIgJcvf/exec";
    const logoImg = new Image();
    logoImg.src = 'LOGO EXPERIENCIAS DE MARCA 2.0.pdf (2).png'; 

    let fotosAParticipar = [];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; });

    // --- LÓGICA CÁMARA ---
    btnCapturar.onclick = () => {
        if (!selectorOp.value) return alert("Selecciona un operador");
        navigator.geolocation.getCurrentPosition(pos => {
            marcarFoto(video, pos.coords.latitude, pos.coords.longitude);
        }, () => {
            alert("No se pudo obtener ubicación. Se enviará solo con fecha.");
            marcarFoto(video, null, null);
        });
    };

    // --- LÓGICA GALERÍA ---
    btnGaleria.onclick = () => {
        if (!selectorOp.value) return alert("Selecciona un operador");
        fileInput.click();
    };

    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        status.style.display = "block";
        progressText.innerText = "Procesando imágenes...";
        fotosAParticipar = [];

        for (let file of files) {
            const img = await createImageBitmap(file);
            marcarFoto(img, null, null, true); // null para no mostrar GPS
        }
        
        mostrarConfirmacionMultiple(files.length);
    };

    function marcarFoto(fuente, lat, lon, esMultiple = false) {
        const ctx = canvas.getContext('2d');
        // Ajustar resolución para que no pesen tanto
        canvas.width = 1080;
        canvas.height = (fuente.videoHeight || fuente.height) / (fuente.videoWidth || fuente.width) * 1080;
        
        ctx.drawImage(fuente, 0, 0, canvas.width, canvas.height);
        
        // Logo (Esq. Superior Derecha)
        const logoAncho = 120;
        const logoAlto = (logoImg.height / logoImg.width) * logoAncho;
        ctx.drawImage(logoImg, canvas.width - logoAncho - 30, 30, logoAncho, logoAlto);
        
        // Barra Inferior
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
        
        ctx.fillStyle = "white";
        const fechaActual = new Date();
        ctx.font = "bold 28px Arial";
        ctx.fillText(`📍 Valledupar | Op: ${selectorOp.value}`, 25, canvas.height - 60);
        
        ctx.font = "22px Arial";
        let infoGps = lat ? ` | Lat: ${lat.toFixed(4)} Lon: ${lon.toFixed(4)}` : "";
        ctx.fillText(`📅 ${fechaActual.toLocaleString()}${infoGps}`, 25, canvas.height - 25);
        
        const base64 = canvas.toDataURL('image/jpeg', 0.8);
        
        if (esMultiple) {
            fotosAParticipar.push(base64);
        } else {
            fotosAParticipar = [base64];
            preview.src = base64;
            mostrarConfirmacion();
        }
    }

    function mostrarConfirmacion() {
        preview.classList.remove('hidden');
        video.classList.add('hidden');
        groupCamara.classList.add('hidden');
        groupConfirmar.classList.remove('hidden');
        status.style.display = "none";
    }

    function mostrarConfirmacionMultiple(cantidad) {
        status.innerHTML = `📸 ${cantidad} fotos listas para subir.`;
        status.style.display = "block";
        groupCamara.classList.add('hidden');
        groupConfirmar.classList.remove('hidden');
    }

    btnReintentar.onclick = () => location.reload();

    btnEnviar.onclick = async () => {
        btnEnviar.disabled = true;
        status.style.display = "block";
        const total = fotosAParticipar.length;

        for (let i = 0; i < total; i++) {
            progressText.innerText = `Subiendo ${i + 1} de ${total}...`;
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    imagen: fotosAParticipar[i],
                    operador: selectorOp.value,
                    fecha: new Date().toISOString().split('T')[0]
                })
            });
        }

        alert("✅ Todas las imágenes se subieron correctamente.");
        location.reload();
    };
</script>
</body>
</html>
