<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditoría TaDa - Valledupar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; margin-bottom: 5px; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background-color: #d32f2f; color: white; border: none; font-weight: bold; cursor: pointer; }
        .secondary-btn { background-color: #555; margin-top: 5px; }
        #video, #preview { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; }
        #status { display: none; color: #d32f2f; font-weight: bold; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Auditoría TaDa</h2>
    
    <select id="operador">
        <option value="">Seleccione Operador...</option>
        <option value="Alberto Carcamo">Alberto Carcamo</option>
        <option value="Daniela Figueroa">Daniela Figueroa</option>
        <option value="Lisseth Rojas">Lisseth Rojas</option>
        <option value="Luis Quintero">Luis Quintero</option>
        <option value="Pearly Khan">Pearly Khan</option>
    </select>

    <video id="video" autoplay playsinline></video>
    <img id="preview" class="hidden">
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="status">Subiendo evidencia a Drive...</div>

    <button id="btnCapturar">TOMAR FOTO</button>
    <div id="groupConfirmar" class="hidden">
        <button id="btnEnviar">SÍ, ENVIAR FOTO ✅</button>
        <button id="btnReintentar" class="secondary-btn">REPETIR FOTO ❌</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const btnCapturar = document.getElementById('btnCapturar');
    const btnEnviar = document.getElementById('btnEnviar');
    const btnReintentar = document.getElementById('btnReintentar');
    const groupConfirmar = document.getElementById('groupConfirmar');
    const status = document.getElementById('status');
    const selectorOp = document.getElementById('operador');
    
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyH5WtN9TNodRvzdvDtgh0SV2ip9lVDPysZyd59TB40G-SbDE4WM8QbchkqUWIgJcvf/exec";

    const logoImg = new Image();
    logoImg.src = 'LOGO EXPERIENCIAS DE MARCA 2.0.pdf (2).png'; 

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; });

    btnCapturar.onclick = () => {
        if (!selectorOp.value) return alert("Selecciona un operador");

        navigator.geolocation.getCurrentPosition(pos => {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0);
            
            // --- CAMBIO AQUÍ: Logo un 50% más pequeño (de 120 a 60) ---
            const logoAncho = 60; 
            const logoAlto = (logoImg.height / logoImg.width) * logoAncho;
            ctx.drawImage(logoImg, canvas.width - logoAncho - 20, 20, logoAncho, logoAlto);
            
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, canvas.height - 70, canvas.width, 70);
            
            ctx.fillStyle = "white";
            const fechaActual = new Date();
            ctx.font = "bold 18px Arial";
            ctx.fillText(`📍 Valledupar | Op: ${selectorOp.value}`, 15, canvas.height - 40);
            ctx.font = "14px Arial";
            ctx.fillText(`📅 ${fechaActual.toLocaleString()} | Lat: ${pos.coords.latitude.toFixed(4)} Lon: ${pos.coords.longitude.toFixed(4)}`, 15, canvas.height - 15);
            
            datosEnvio = {
                imagen: canvas.toDataURL('image/jpeg', 0.8),
                operador: selectorOp.value,
                fecha: fechaActual.toISOString().split('T')[0]
            };

            preview.src = datosEnvio.imagen;
            preview.classList.remove('hidden');
            video.classList.add('hidden');
            btnCapturar.classList.add('hidden');
            groupConfirmar.classList.remove('hidden');

        }, () => alert("Activa el GPS para tomar la foto"));
    };

    btnReintentar.onclick = () => {
        preview.classList.add('hidden');
        video.classList.remove('hidden');
        btnCapturar.classList.remove('hidden');
        groupConfirmar.classList.add('hidden');
    };

    btnEnviar.onclick = () => {
        btnEnviar.disabled = true;
        btnReintentar.disabled = true;
        status.style.display = "block";

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(datosEnvio)
        }).then(() => {
            alert("✅ Evidencia cargada correctamente.");
            location.reload();
        }).catch(e => {
            alert("Error: " + e);
            btnEnviar.disabled = false;
            btnReintentar.disabled = false;
        });
    };
</script>
</body>
</html>
