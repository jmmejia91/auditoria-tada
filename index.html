<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditoría TaDa - Valledupar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background-color: #d32f2f; color: white; border: none; font-weight: bold; }
        #video { width: 100%; border-radius: 10px; background: #000; }
        #status { display: none; color: #d32f2f; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Auditoría TaDa</h2>
    
    <select id="operador">
        <option value="">Seleccione Operador...</option>
        <option value="Alberto Carcamo">Alberto Carcamo</option>
        <option value="Daniela Figueroa">Daniela Figueroa</option>
        <option value="Lisseth Rojas">Lisseth Rojas</option>
        <option value="Luis Quintero">Luis Quintero</option>
        <option value="Pearly Khan">Pearly Khan</option>
    </select>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="status">Procesando envío...</div>
    <button id="btnCapturar">TOMAR FOTO Y ENVIAR</button>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const btnCapturar = document.getElementById('btnCapturar');
    const status = document.getElementById('status');
    
    // REEMPLAZA ESTA URL CON TU URL DE APPS SCRIPT (/exec)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyH5WtN9TNodRvzdvDtgh0SV2ip9lVDPysZyd59TB40G-SbDE4WM8QbchkqUWIgJcvf/exec";

    // Cargar el logo con el nombre exacto que me pasaste
    const logoImg = new Image();
    logoImg.src = 'LOGO EXPERIENCIAS DE MARCA 2.0.pdf (2).png'; 

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; });

    btnCapturar.onclick = () => {
        const op = document.getElementById('operador').value;
        if (!op) return alert("Selecciona un operador primero.");

        btnCapturar.disabled = true;
        status.style.display = "block";

        navigator.geolocation.getCurrentPosition(pos => {
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // 1. Dibujar la foto original
            ctx.drawImage(video, 0, 0);
            
            // 2. Dibujar el LOGO en la esquina superior derecha
            // Ajustamos el tamaño a 120px de ancho aproximadamente
            const logoAncho = 120;
            const logoAlto = (logoImg.height / logoImg.width) * logoAncho;
            ctx.drawImage(logoImg, canvas.width - logoAncho - 20, 20, logoAncho, logoAlto);
            
            // 3. Dibujar la barra de datos inferior (Negra traslúcida)
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            
            // 4. Escribir los datos (Ciudad, Operador, Fecha, GPS)
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            const fechaActual = new Date();
            ctx.fillText(`📍 Valledupar | Op: ${op}`, 15, canvas.height - 35);
            ctx.fillText(`📅 ${fechaActual.toLocaleString()} | Lat: ${pos.coords.latitude.toFixed(4)} Lon: ${pos.coords.longitude.toFixed(4)}`, 15, canvas.height - 15);
            
            // 5. Convertir y enviar
            const base64 = canvas.toDataURL('image/jpeg', 0.8);
            enviarADrive(base64, op, fechaActual.toISOString().split('T')[0]);
        }, err => {
            alert("Error: Debes permitir el acceso al GPS para continuar.");
            btnCapturar.disabled = false;
            status.style.display = "none";
        });
    };

    function enviarADrive(base64, operador, fechaStr) {
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ imagen: base64, operador: operador, fecha: fechaStr })
        }).then(() => {
            alert("✅ Evidencia cargada correctamente en Drive.");
            location.reload();
        }).catch(e => {
            alert("Error al subir: " + e);
            btnCapturar.disabled = false;
        });
    }
</script>
</body>
</html>
