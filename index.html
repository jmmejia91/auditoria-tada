<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditoría TaDa - Valledupar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; margin-bottom: 5px; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background-color: #d32f2f; color: white; border: none; font-weight: bold; cursor: pointer; }
        .secondary-btn { background-color: #555; margin-top: 5px; }
        .gallery-btn { background-color: #2e7d32; }
        #video, #preview { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; }
        #status { display: none; background-color: #fff9c4; padding: 15px; border-radius: 8px; color: #856404; font-weight: bold; margin-top: 10px; border: 1px solid #ffeeba; }
        .hidden { display: none !important; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Auditoría TaDa</h2>
    
    <select id="operador">
        <option value="">Seleccione Operador...</option>
        <option value="Alberto Carcamo">Alberto Carcamo</option>
        <option value="Daniela Figueroa">Daniela Figueroa</option>
        <option value="Lisseth Rojas">Lisseth Rojas</option>
        <option value="Luis Quintero">Luis Quintero</option>
        <option value="Pearly Khan">Pearly Khan</option>
    </select>

    <video id="video" autoplay playsinline></video>
    <img id="preview" class="hidden">
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="status">Procesando... <span id="progress"></span></div>

    <div id="groupCamara">
        <button id="btnCapturar">TOMAR FOTO</button>
        <button id="btnGaleria" class="gallery-btn">SUBIR DE GALERÍA (VARIAS)</button>
        <input type="file" id="fileInput" accept="image/*" multiple>
    </div>

    <div id="groupConfirmar" class="hidden">
        <button id="btnEnviar">SÍ, ENVIAR ✅</button>
        <button id="btnReintentar" class="secondary-btn">CANCELAR / REPETIR ❌</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const btnCapturar = document.getElementById('btnCapturar');
    const btnGaleria = document.getElementById('btnGaleria');
    const fileInput = document.getElementById('fileInput');
    const btnEnviar = document.getElementById('btnEnviar');
    const btnReintentar = document.getElementById('btnReintentar');
    const groupConfirmar = document.getElementById('groupConfirmar');
    const groupCamara = document.getElementById('groupCamara');
    const status = document.getElementById('status');
    const progressText = document.getElementById('progress');
    const selectorOp = document.getElementById('operador');
    
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyH5WtN9TNodRvzdvDtgh0SV2ip9lVDPysZyd59TB40G-SbDE4WM8QbchkqUWIgJcvf/exec";
    const logoImg = new Image();
    logoImg.src = 'LOGO EXPERIENCIAS DE MARCA 2.0.pdf (2).png'; 

    let fotosAParticipar = [];

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { video.srcObject = stream; });

    // --- LÓGICA DE MARCADO PROPORCIONAL (CAMBIO CLAVE AQUÍ) ---
    function marcarFoto(fuente, lat, lon, esMultiple = false) {
        const ctx = canvas.getContext('2d');
        
        // Obtener la resolución original de la imagen
        const originalWidth = fuente.videoWidth || fuente.width;
        const originalHeight = fuente.videoHeight || fuente.height;

        // Establecer el ancho del canvas a 1080px (buena calidad pero no gigante)
        // y calcular el alto proporcionalmente.
        canvas.width = 1080; 
        canvas.height = (originalHeight / originalWidth) * 1080;
        
        // Dibujar la foto escalada al tamaño del canvas
        ctx.drawImage(fuente, 0, 0, canvas.width, canvas.height);
        
        // --- Cálculo proporcional para el Logo y Barra (NUEVO) ---
        // Basamos los tamaños en un porcentaje del ancho de la imagen final (1080px)
        const factorProporcional = canvas.width / 1000; // factor de escala base
        
        // Logo proporcional (aprox 12% del ancho)
        const logoAnchoProporcional = 120 * factorProporcional; 
        const logoAltoProporcional = (logoImg.height / logoImg.width) * logoAnchoProporcional;
        const margenLogo = 30 * factorProporcional;
        
        ctx.drawImage(logoImg, canvas.width - logoAnchoProporcional - margenLogo, margenLogo, logoAnchoProporcional, logoAltoProporcional);
        
        // Barra inferior proporcional (aprox 10% del alto)
        const altoBarraProporcional = canvas.height * 0.10;
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, canvas.height - altoBarraProporcional, canvas.width, altoBarraProporcional);
        
        ctx.fillStyle = "white";
        const fechaActual = new Date();
        
        // Textos proporcionales
        ctx.font = `bold ${28 * factorProporcional}px Arial`;
        const margenTextoX = 25 * factorProporcional;
        const margenTextoY1 = altoBarraProporcional * 0.40;
        ctx.fillText(`📍 Valledupar | Op: ${selectorOp.value}`, margenTextoX, canvas.height - altoBarraProporcional + margenTextoY1);
        
        ctx.font = `${22 * factorProporcional}px Arial`;
        const margenTextoY2 = altoBarraProporcional * 0.75;
        let infoGps = lat ? ` | Lat: ${lat.toFixed(4)} Lon: ${lon.toFixed(4)}` : "";
        ctx.fillText(`📅 ${fechaActual.toLocaleDateString()} ${infoGps}`, margenTextoX, canvas.height - altoBarraProporcional + margenTextoY2);
        
        const base64 = canvas.toDataURL('image/jpeg', 0.8);
        
        if (esMultiple) {
            fotosAParticipar.push(base64);
        } else {
            fotosAParticipar = [base64];
            preview.src = base64;
            mostrarConfirmacion();
        }
    }

    // --- EL RESTO DE LA LÓGICA SE MANTIENE IGUAL ---
    btnCapturar.onclick = () => {
        if (!selectorOp.value) return alert("Selecciona un operador");
        status.style.display = "block";
        status.innerText = "Capturando ubicación...";
        navigator.geolocation.getCurrentPosition(pos => {
            marcarFoto(video, pos.coords.latitude, pos.coords.longitude);
        }, () => {
            alert("No se pudo obtener ubicación. Se enviará solo con fecha.");
            marcarFoto(video, null, null);
        });
    };

    btnGaleria.onclick = () => {
        if (!selectorOp.value) return alert("Selecciona un operador");
        fileInput.click();
    };

    fileInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        groupCamara.classList.add('hidden');
        status.style.display = "block";
        fotosAParticipar = [];

        for (let i = 0; i < files.length; i++) {
            status.innerText = `⏳ Cargando fotos de galería (${i + 1} de ${files.length})...`;
            const img = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const tempImg = new Image();
                    tempImg.onload = () => resolve(tempImg);
                    tempImg.src = event.target.result;
                };
                reader.readAsDataURL(files[i]);
            });
            marcarFoto(img, null, null, true); // null GPS para galería
        }
        mostrarConfirmacionMultiple(files.length);
    };

    function mostrarConfirmacion() {
        preview.classList.remove('hidden');
        video.classList.add('hidden');
        groupCamara.classList.add('hidden');
        groupConfirmar.classList.remove('hidden');
        status.style.display = "none";
    }

    function mostrarConfirmacionMultiple(cantidad) {
        status.innerText = `📸 ${cantidad} fotos procesadas y listas para subir.`;
        status.style.display = "block";
        groupConfirmar.classList.remove('hidden');
    }

    btnReintentar.onclick = () => location.reload();

    btnEnviar.onclick = async () => {
        btnEnviar.disabled = true;
        btnReintentar.disabled = true;
        status.style.display = "block";
        const total = fotosAParticipar.length;

        for (let i = 0; i < total; i++) {
            status.innerText = `🚀 Subiendo a Drive: ${i + 1} de ${total}...`;
            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        imagen: fotosAParticipar[i],
                        operador: selectorOp.value,
                        fecha: new Date().toISOString().split('T')[0]
                    })
                });
            } catch (e) {
                console.error(e);
            }
        }
        alert("✅ Todas las imágenes se subieron correctamente.");
        location.reload();
    };
</script>
</body>
</html>
